<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penlinekitchen Menu</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        :root {
            --primary-color: #d9534f;
            --background-color: #fcecec;
            --card-bg: #ffffff;
            --text-color: #333;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        body {
            font-family: sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 2rem;
        }

        img {
            display: block;
            width: 100%;
        }

        h1,
        h2 {
            color: var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
        }

        /* HERO */
        .hero-container {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            border-radius: var(--radius);
            margin-bottom: 3rem;
            box-shadow: var(--shadow);
        }

        .hero-container img {
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slogan {
            color: burlywood;
            font-size: 2.5rem;
            font-style: italic;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* MENU SECTION */
        .menu-section {
            margin-bottom: 4rem;
        }

        .menu-title {
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            font-size: 1.8rem;
        }

        .menu-items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
        }

        /* CARD */
        .menu-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px);
        }

        .menu-item img {
            height: 170px;
            object-fit: cover;
        }

        .item-details {
            padding: 1rem;
            text-align: center;
        }

        .item-name {
            display: block;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .item-price {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 5rem;
            font-style: italic;
            line-height: 1.8;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .hero-container {
                height: 250px;
            }

            .slogan {
                font-size: 1.7rem;
                text-align: center;
                padding: 0 1rem;
            }

            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1>PENLINEKITCHEN MENU</h1>
    </header>

    <!-- HERO -->

                ]

        ];

        // =========================
        // RENDER FUNCTION
        // =========================

        const menuContainer = document.getElementById("menu-container");

        function createMenuItem(item) {
            return `
                <div class="menu-item">
                    <img src="${item.image}" alt="${item.name}" />

                    <div class="item-details">
                        <span class="item-name">${item.name}</span>

                        <span class="item-price">${item.price}</span>
                    </div>
                </div>
            `;
        }

        function createMenuSection(section) {
            return `
                <section class="menu-section">

                    <h2 class="menu-title">
                        ${section.title}
                    </h2>

                    <div class="menu-items-grid">
                        ${section.items.map(createMenuItem).join("")}
                    </div>

                </section>
            `;
        }

        function renderMenu() {
            menuContainer.innerHTML =
                menuData.map(createMenuSection).join("");
        }

        // =========================
        // INIT
        // =========================

        renderMenu();

        document.getElementById("year").textContent =
            new Date().getFullYear();

    </script>
